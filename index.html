<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Pocket Thoughts – Harvest a thought. Let it grow gently." />
  <title>Pocket Thoughts</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ── Header ─────────────────────────────────────────── -->
  <header class="app-header" role="banner">
    <span class="app-logo" aria-label="Pocket Thoughts">✦</span>
    <nav class="header-nav" aria-label="App navigation">
      <!-- Language Toggle -->
      <div class="lang-toggle" role="group" aria-label="Language selection">
        <button class="lang-btn" id="lang-en" data-lang="en" aria-pressed="true">EN</button>
        <span class="lang-sep" aria-hidden="true">/</span>
        <button class="lang-btn" id="lang-de" data-lang="de" aria-pressed="false">DE</button>
      </div>
      <!-- Menu -->
      <div class="menu-wrap">
        <button class="menu-trigger" id="menu-trigger" aria-label="Open menu" aria-expanded="false" aria-controls="main-menu">
          <span class="menu-icon" aria-hidden="true">
            <span></span><span></span><span></span>
          </span>
        </button>
        <div class="menu-dropdown" id="main-menu" role="menu" hidden>
          <a class="menu-item" id="menu-back-link" href="https://smartstruggle.de" target="_blank" rel="noopener noreferrer" role="menuitem" data-i18n="menuBackLink">Back to Smart Struggle</a>
        </div>
      </div>
    </nav>
  </header>
  <!-- ── Main ───────────────────────────────────────────── -->
  <main class="app-main" id="app-main">
    <!-- Screen: Home -->
    <section class="screen screen-home active" id="screen-home" aria-label="Home">
      <div class="home-content">
        <div class="tree-wrap" aria-hidden="true">
          <!-- SVG Tree -->
          <svg class="tree-svg" viewBox="0 0 200 260" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <!-- Trunk -->
            <rect x="90" y="180" width="20" height="70" rx="10" fill="var(--color-brown-light)"/>
            <!-- Root hints -->
            <path d="M100 248 Q80 258 65 252" stroke="var(--color-brown-light)" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5"/>
            <path d="M100 248 Q120 258 135 252" stroke="var(--color-brown-light)" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5"/>
            <!-- Main canopy layers -->
            <ellipse cx="100" cy="155" rx="62" ry="44" fill="var(--color-sage-mid)"/>
            <ellipse cx="100" cy="130" rx="50" ry="40" fill="var(--color-sage)"/>
            <ellipse cx="100" cy="108" rx="38" ry="34" fill="var(--color-sage-light)"/>
            <ellipse cx="100" cy="92"  rx="26" ry="26" fill="var(--color-sage)"/>
            <!-- Subtle branch hints -->
            <line x1="100" y1="180" x2="68"  y2="160" stroke="var(--color-brown-light)" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
            <line x1="100" y1="180" x2="132" y2="160" stroke="var(--color-brown-light)" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
            <!-- Thought buds (small circles) -->
            <circle cx="66" cy="152" r="5" fill="var(--color-cream)" opacity="0.7"/>
            <circle cx="134" cy="148" r="4" fill="var(--color-cream)" opacity="0.6"/>
            <circle cx="100" cy="78"  r="4" fill="var(--color-cream)" opacity="0.65"/>
          </svg>
        </div>
        <h1 class="home-title">Pocket Thoughts</h1>
        <p class="home-subtitle" data-i18n="homeSubtitle">Harvest a thought. Let it grow gently.</p>
        <button class="btn btn-primary harvest-btn" id="harvest-btn" data-i18n="harvestBtn">
          Harvest a thought
        </button>
        <button class="btn btn-ghost garden-btn" id="garden-btn" aria-label="Open garden">
          <span class="garden-btn-icon" aria-hidden="true">⬡</span>
          <span data-i18n="gardenBtn">My Garden</span>
          <span class="garden-count-badge" id="garden-count-badge" aria-live="polite">0</span>
        </button>
      </div>
    </section>
    <!-- Screen: Harvest -->
    <section class="screen screen-harvest" id="screen-harvest" aria-label="Harvest" hidden>
      <div class="screen-inner">
        <p class="harvest-eyebrow" data-i18n="harvestEyebrow">Three thoughts from the tree</p>
        <div class="thought-cards" id="thought-cards" role="list">
          <!-- Cards injected by JS -->
        </div>
        <!-- Action area (appears after selection) -->
        <div class="harvest-actions" id="harvest-actions" aria-live="polite">
          <!-- Buttons injected by JS -->
        </div>
        <button class="btn btn-ghost back-btn" id="back-btn-harvest" data-i18n="backBtn">← Back</button>
      </div>
    </section>
    <!-- Screen: Garden -->
    <section class="screen screen-garden" id="screen-garden" aria-label="Garden" hidden>
      <div class="screen-inner">
        <h2 class="section-title" data-i18n="gardenTitle">My Garden</h2>
        <p class="garden-meta" data-i18n="gardenMeta">A quiet space for your chosen thoughts.</p>
        <div class="garden-grid" id="garden-grid" role="list" aria-label="Planted thoughts">
          <!-- Slots injected by JS -->
        </div>
        <div class="garden-message" id="garden-message" aria-live="polite" hidden></div>
        <button class="btn btn-ghost back-btn" id="back-btn-garden" data-i18n="backBtn">← Back</button>
      </div>
    </section>
    <!-- Screen: Thought Detail -->
    <section class="screen screen-detail" id="screen-detail" aria-label="Thought detail" hidden>
      <div class="screen-inner screen-detail-inner">
        <div class="detail-leaf" aria-hidden="true">
          <svg viewBox="0 0 60 80" fill="none" xmlns="[w3.org](http://www.w3.org/2000/svg)">
            <path d="M30 75 C10 60 5 35 30 5 C55 35 50 60 30 75Z" fill="var(--color-sage)" opacity="0.35"/>
            <line x1="30" y1="75" x2="30" y2="20" stroke="var(--color-sage-mid)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
          </svg>
        </div>
        <blockquote class="detail-quote" id="detail-quote"></blockquote>
        <button class="btn btn-soft remove-btn" id="remove-btn" data-i18n="removeBtn">Let this thought go</button>
        <button class="btn btn-ghost back-btn" id="back-btn-detail" data-i18n="backBtn">← Back</button>
      </div>
    </section>
  </main>
  <!-- ── Toast / Message ────────────────────────────────── -->
  <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>
  <!-- ── Seed Animation Overlay ─────────────────────────── -->
  <div class="seed-overlay" id="seed-overlay" aria-hidden="true" hidden>
    <div class="seed-particle">✦</div>
  </div>
  <script src="script.js"></script>
</body>
</html>
